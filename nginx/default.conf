server {
    listen 80;
    server_name nutriguide.koreacentral.cloudapp.azure.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nutriguide.koreacentral.cloudapp.azure.com;

    ssl_certificate /etc/letsencrypt/live/nutriguide.koreacentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nutriguide.koreacentral.cloudapp.azure.com/privkey.pem;

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}